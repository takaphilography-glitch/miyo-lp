<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>衣装管理 - miyo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600&family=Noto+Sans+JP:wght@400;500;700&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<script src="https://upload-widget.cloudinary.com/global/all.js" defer></script>
<style>
  :root{
    --bg:        #f5f0e6;
    --bg-deep:   #ece4d3;
    --bg-paper:  #faf6ec;
    --sakura:    #e8b4b8;
    --sakura-deep:#d18a8f;
    --sumi:      #2b2625;
    --sumi-soft: #5a514f;
    --gold:      #b8956a;
    --gold-light:#d4b88a;
    --line:      #d8cfb8;
    --shadow:    rgba(43,38,37,.08);
    --success:   #5a8a5e;
    --danger:    #c25a55;

    --serif: 'Shippori Mincho', 'Yu Mincho', '游明朝', YuMincho, serif;
    --sans:  'Noto Sans JP', 'Hiragino Sans', sans-serif;
    --italic:'Cormorant Garamond', serif;
  }
  *{ box-sizing: border-box; margin: 0; padding: 0; }
  html, body{ background: var(--bg); color: var(--sumi); }
  body{
    font-family: var(--sans);
    line-height: 1.7;
    padding: 20px;
    min-height: 100vh;
  }
  .container{ max-width: 1200px; margin: 0 auto; }

  /* ========== ヘッダ ========== */
  header.app-head{
    background: var(--bg-paper);
    padding: 22px 28px;
    border: 1px solid var(--line);
    border-radius: 4px;
    margin-bottom: 20px;
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 12px;
  }
  header.app-head h1{
    font-family: var(--serif);
    font-size: 20px;
    letter-spacing: .2em;
    font-weight: 600;
  }
  header.app-head h1::before{ content: '❀ '; color: var(--sakura-deep); }
  header.app-head .meta{
    font-size: 13px;
    color: var(--sumi-soft);
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  header.app-head .meta .num{
    color: var(--sakura-deep);
    font-weight: 600;
    margin: 0 4px;
    font-family: var(--italic);
    font-size: 16px;
  }

  /* ========== ボタン ========== */
  .btn{
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 10px 20px;
    background: var(--sumi);
    color: var(--bg-paper);
    border: none;
    border-radius: 3px;
    font-size: 13px;
    letter-spacing: .1em;
    cursor: pointer;
    font-family: var(--sans);
    transition: background .25s, opacity .2s;
  }
  .btn:hover{ background: var(--sakura-deep); }
  .btn-primary{ background: var(--sakura-deep); }
  .btn-primary:hover{ background: var(--sumi); }
  .btn-ghost{
    background: transparent;
    color: var(--sumi);
    border: 1px solid var(--line);
  }
  .btn-ghost:hover{ background: var(--bg-paper); }
  .btn-danger{ background: var(--danger); }
  .btn-danger:hover{ background: #a73e3a; }
  .btn-sm{ padding: 6px 12px; font-size: 12px; }
  .btn:disabled{ opacity: .5; cursor: not-allowed; }
  .btn:disabled:hover{ background: var(--sumi); }

  /* ========== ログイン ========== */
  .login-box{
    max-width: 400px;
    margin: 80px auto;
    background: var(--bg-paper);
    padding: 40px;
    border: 1px solid var(--line);
    border-radius: 4px;
    text-align: center;
    box-shadow: 0 8px 24px var(--shadow);
  }
  .login-box h2{
    font-family: var(--serif);
    font-size: 18px;
    margin-bottom: 8px;
    letter-spacing: .15em;
  }
  .login-box .lead{
    font-size: 12px;
    color: var(--sumi-soft);
    margin-bottom: 24px;
    letter-spacing: .05em;
  }
  .login-box input{
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 3px;
    font-size: 14px;
    background: var(--bg);
    margin-bottom: 16px;
    font-family: var(--sans);
  }
  .login-box input:focus{ outline: none; border-color: var(--sakura-deep); }
  .login-box .err{
    color: var(--danger);
    font-size: 12px;
    margin-top: 12px;
    min-height: 1em;
  }

  /* ========== ツールバー ========== */
  .toolbar{
    background: var(--bg-paper);
    padding: 14px 18px;
    border: 1px solid var(--line);
    border-radius: 4px;
    margin-bottom: 18px;
    display: flex; gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .toolbar .filter{ display: flex; gap: 6px; flex-wrap: wrap; }
  .toolbar .filter button{
    padding: 6px 14px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    font-family: var(--sans);
    color: var(--sumi-soft);
    transition: background .2s, color .2s, border-color .2s;
  }
  .toolbar .filter button.active{
    background: var(--sumi);
    color: var(--bg-paper);
    border-color: var(--sumi);
  }
  .toolbar .search{
    padding: 7px 12px;
    border: 1px solid var(--line);
    border-radius: 3px;
    font-size: 13px;
    width: 200px;
    background: var(--bg);
    font-family: var(--sans);
  }
  .toolbar .search:focus{ outline: none; border-color: var(--sakura-deep); }
  .toolbar .spacer{ flex: 1; }

  /* ========== グリッド ========== */
  .grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
  }
  .card{
    position: relative;
    background: var(--bg-paper);
    border: 1px solid var(--line);
    border-radius: 4px;
    overflow: hidden;
    transition: box-shadow .25s, border-color .2s;
  }
  .card:hover{ box-shadow: 0 8px 20px var(--shadow); }
  .card.dirty{ border-color: var(--sakura-deep); }
  .card.dirty::before{
    content: '未保存';
    position: absolute;
    top: 8px; right: 8px;
    background: var(--sakura-deep);
    color: white;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    letter-spacing: .05em;
    z-index: 2;
  }

  .card-img{
    aspect-ratio: 3/4;
    background: var(--bg-deep);
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .card-img img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .card-img .ph{
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    color: var(--sumi-soft);
    background: linear-gradient(135deg, var(--bg-deep), var(--bg-paper));
    font-size: 13px;
  }
  .card-img .ph::before{
    content: '📷';
    font-size: 32px;
    margin-bottom: 6px;
  }
  .card-img:hover::after{
    content: 'クリックで画像変更';
    position: absolute;
    inset: 0;
    background: rgba(43,38,37,.7);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    letter-spacing: .1em;
  }

  .card-body{ padding: 12px; }
  .card-body input,
  .card-body select{
    width: 100%;
    padding: 7px 10px;
    border: 1px solid var(--line);
    border-radius: 3px;
    font-size: 13px;
    margin-bottom: 8px;
    background: var(--bg);
    font-family: var(--sans);
    color: var(--sumi);
  }
  .card-body input:focus,
  .card-body select:focus{
    outline: none;
    border-color: var(--sakura-deep);
  }
  .card-actions{
    display: flex; gap: 6px;
  }
  .card-actions .btn{ flex: 1; }
  .card-id{
    font-family: var(--italic);
    font-style: italic;
    font-size: 11px;
    color: var(--sumi-soft);
    margin-bottom: 6px;
    word-break: break-all;
  }

  /* ========== 保存バー ========== */
  .save-bar{
    position: sticky;
    bottom: 12px;
    background: var(--sumi);
    color: var(--bg-paper);
    padding: 14px 22px;
    border-radius: 6px;
    margin-top: 22px;
    display: none;
    justify-content: space-between; align-items: center;
    box-shadow: 0 8px 22px rgba(43,38,37,.28);
    flex-wrap: wrap; gap: 12px;
    z-index: 10;
  }
  .save-bar.visible{ display: flex; }
  .save-bar .info{
    font-size: 13px;
    letter-spacing: .05em;
  }
  .save-bar .info .num{
    color: var(--sakura);
    margin: 0 4px;
    font-size: 16px;
    font-family: var(--italic);
    font-weight: 600;
  }
  .save-bar .actions{ display: flex; gap: 8px; }
  .save-bar .btn-ghost{
    background: rgba(255,255,255,.08);
    color: white;
    border-color: rgba(255,255,255,.3);
  }
  .save-bar .btn-ghost:hover{ background: rgba(255,255,255,.18); }
  .save-bar .save-msg{
    font-size: 12px;
    margin-right: 10px;
    color: var(--sakura);
  }
  .save-bar .save-msg.error{ color: #ffb4b4; }

  /* ========== 空状態 ========== */
  .empty{
    text-align: center;
    padding: 80px 20px;
    color: var(--sumi-soft);
  }
  .empty p{ margin-bottom: 20px; font-size: 14px; }

  /* ========== モーダル ========== */
  .modal-bg{
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(43,38,37,.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-bg.open{ display: flex; }
  .modal{
    background: var(--bg-paper);
    padding: 28px;
    border-radius: 4px;
    max-width: 420px;
    width: 100%;
    border: 1px solid var(--line);
  }
  .modal h3{
    font-family: var(--serif);
    margin-bottom: 16px;
    letter-spacing: .15em;
    font-size: 16px;
  }
  .modal label{
    display: block;
    font-size: 12px;
    margin: 12px 0 4px;
    color: var(--sumi-soft);
    letter-spacing: .1em;
  }
  .modal input,
  .modal select{
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--line);
    border-radius: 3px;
    font-size: 14px;
    background: var(--bg);
    font-family: var(--sans);
    color: var(--sumi);
  }
  .modal input:focus,
  .modal select:focus{ outline: none; border-color: var(--sakura-deep); }
  .modal-actions{
    margin-top: 22px;
    display: flex; gap: 8px; justify-content: flex-end;
  }

  /* ========== トースト ========== */
  .toast{
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 24px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 500;
    color: white;
    z-index: 300;
    background: var(--success);
    box-shadow: 0 8px 20px rgba(43,38,37,.25);
    animation: slideUp .3s ease;
  }
  .toast.error{ background: var(--danger); }
  @keyframes slideUp{
    from{ opacity:0; transform: translate(-50%, 20px); }
    to  { opacity:1; transform: translate(-50%, 0); }
  }

  @media (max-width: 600px){
    body{ padding: 12px; }
    .grid{ grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .toolbar{ flex-direction: column; align-items: stretch; }
    .toolbar .search{ width: 100%; }
    .toolbar .spacer{ display: none; }
    header.app-head h1{ font-size: 17px; }
  }
</style>
</head>
<body>

<!-- ========== ログイン画面 ========== -->
<div id="login-screen" class="login-box">
  <h2>❀ 衣装管理</h2>
  <p class="lead">パスワードを入力してください</p>
  <input type="password" id="password-input" placeholder="パスワード" autocomplete="current-password">
  <button class="btn btn-primary" style="width:100%;" id="login-btn">ログイン</button>
  <p id="login-error" class="err"></p>
</div>

<!-- ========== 管理画面 ========== -->
<div id="admin-screen" class="container" style="display:none;">
  <header class="app-head">
    <h1>衣装管理</h1>
    <div class="meta">
      <span>合計 <span class="num" id="total-count">0</span>着</span>
      <span>表示中 <span class="num" id="visible-count">0</span>着</span>
      <button class="btn btn-ghost btn-sm" id="logout-btn">ログアウト</button>
    </div>
  </header>

  <div class="toolbar">
    <div class="filter" id="filter-tabs">
      <button class="active" data-cat="all">すべて</button>
      <button data-cat="kimono">和装</button>
      <button data-cat="cosplay">コスプレ</button>
      <button data-cat="dress">ドレス</button>
      <button data-cat="casual">カジュアル</button>
      <button data-cat="other">その他</button>
    </div>
    <input type="text" class="search" id="search-input" placeholder="衣装名で検索">
    <div class="spacer"></div>
    <button class="btn btn-primary" id="open-add-btn">+ 新規追加</button>
  </div>

  <div id="grid" class="grid"></div>

  <div class="empty" id="empty-state" style="display:none;">
    <p>条件に一致する衣装がありません</p>
    <button class="btn btn-primary" id="empty-add-btn">+ 新規追加</button>
  </div>

  <div class="save-bar" id="save-bar">
    <div class="info">
      <span class="num" id="dirty-count">0</span>件の未保存があります
    </div>
    <div class="actions">
      <span class="save-msg" id="save-msg"></span>
      <button class="btn btn-ghost" id="discard-btn">破棄</button>
      <button class="btn btn-primary" id="save-btn">変更を保存</button>
    </div>
  </div>
</div>

<!-- ========== 新規追加モーダル ========== -->
<div class="modal-bg" id="add-modal">
  <div class="modal">
    <h3>❀ 新規衣装を追加</h3>
    <label>衣装名</label>
    <input type="text" id="new-name" placeholder="例：黒地金彩振袖" maxlength="80">
    <label>カテゴリ</label>
    <select id="new-category">
      <option value="kimono">和装</option>
      <option value="cosplay">コスプレ</option>
      <option value="dress">ドレス</option>
      <option value="casual">カジュアル</option>
      <option value="other">その他</option>
    </select>
    <p style="font-size:11px; color:var(--sumi-soft); margin-top:10px; letter-spacing:.05em;">
      画像は追加後にカードからアップロードできます
    </p>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="add-cancel-btn">キャンセル</button>
      <button class="btn btn-primary" id="add-confirm-btn">追加</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   ★ Cloudinary 設定（公開後に差し替え必須）★
   Cloudinary Dashboard → 上部の Cloud Name をコピー
   Settings → Upload → Add upload preset →
     Signing Mode: Unsigned, Preset name: miyo_costumes
   ============================================================ */
const CLOUDINARY_CLOUD_NAME    = 'YOUR_CLOUD_NAME';
const CLOUDINARY_UPLOAD_PRESET = 'miyo_costumes';

const VALID_CATEGORIES = ['kimono', 'cosplay', 'dress', 'casual', 'other'];
const CATEGORY_LABELS = {
  kimono:  '和装',
  cosplay: 'コスプレ',
  dress:   'ドレス',
  casual:  'カジュアル',
  other:   'その他'
};

/* ===== 状態 ===== */
let password = '';
let costumes = [];
let originalCostumes = [];
let activeCategory = 'all';
let searchKeyword = '';
let cloudinaryWidget = null;

/* ===========================================================
   ユーティリティ
   =========================================================== */
function escapeHtml(s){
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => (
    { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]
  ));
}
function deepClone(v){ return JSON.parse(JSON.stringify(v)); }
function makeId(category){
  return `${category}_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
}
function showToast(msg, type){
  const old = document.querySelector('.toast');
  if (old) old.remove();
  const t = document.createElement('div');
  t.className = 'toast' + (type === 'error' ? ' error' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

/* ===========================================================
   ログイン
   ＝ 取得した現データをそのまま PUT し直して認証チェック
   （API側の挙動を変えずに、保存前に正しいパスワードか確認できる）
   =========================================================== */
async function attemptLogin(){
  const pw = document.getElementById('password-input').value.trim();
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  if (!pw){
    errEl.textContent = 'パスワードを入力してください';
    return;
  }
  const loginBtn = document.getElementById('login-btn');
  loginBtn.disabled = true;
  loginBtn.textContent = '確認中...';

  try {
    const getRes = await fetch('/api/costumes', { cache: 'no-store' });
    if (!getRes.ok) throw new Error('GET failed');
    const getData = await getRes.json();
    const current = Array.isArray(getData.costumes) ? getData.costumes : [];

    const verify = await fetch('/api/costumes', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw, costumes: current })
    });
    if (verify.status === 401){
      errEl.textContent = 'パスワードが違います';
      return;
    }
    if (!verify.ok){
      const body = await verify.json().catch(() => ({}));
      errEl.textContent = '接続エラー: ' + (body.error || verify.status);
      return;
    }

    password = pw;
    costumes = deepClone(current);
    originalCostumes = deepClone(current);
    sessionStorage.setItem('miyo_admin_session', '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    render();
  } catch (e){
    errEl.textContent = '接続エラーが発生しました';
  } finally {
    loginBtn.disabled = false;
    loginBtn.textContent = 'ログイン';
  }
}

function logout(){
  if (getDirtyCount() > 0 && !confirm('未保存の変更があります。本当にログアウトしますか？')) return;
  password = '';
  sessionStorage.removeItem('miyo_admin_session');
  location.reload();
}

/* ===========================================================
   差分検出
   =========================================================== */
function isItemDirty(c){
  const orig = originalCostumes.find(o => o.id === c.id);
  if (!orig) return true;
  return orig.name !== c.name || orig.category !== c.category || (orig.image || '') !== (c.image || '');
}
function getDirtyCount(){
  let n = 0;
  for (const c of costumes) if (isItemDirty(c)) n++;
  for (const o of originalCostumes) if (!costumes.find(c => c.id === o.id)) n++;
  return n;
}

/* ===========================================================
   描画
   =========================================================== */
function render(){
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty-state');

  let filtered = costumes;
  if (activeCategory !== 'all'){
    filtered = filtered.filter(c => c.category === activeCategory);
  }
  if (searchKeyword){
    const kw = searchKeyword.toLowerCase();
    filtered = filtered.filter(c => c.name.toLowerCase().includes(kw));
  }

  document.getElementById('total-count').textContent   = costumes.length;
  document.getElementById('visible-count').textContent = filtered.length;

  if (filtered.length === 0){
    grid.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    grid.innerHTML = filtered.map(c => {
      const dirty = isItemDirty(c);
      const visual = c.image
        ? `<img src="${escapeHtml(c.image)}" alt="${escapeHtml(c.name)}" loading="lazy" referrerpolicy="no-referrer">`
        : `<div class="ph">画像なし</div>`;
      const opts = VALID_CATEGORIES.map(cat =>
        `<option value="${cat}" ${cat === c.category ? 'selected' : ''}>${CATEGORY_LABELS[cat]}</option>`
      ).join('');
      return `
        <div class="card${dirty ? ' dirty' : ''}" data-id="${escapeHtml(c.id)}">
          <div class="card-img" data-action="upload">${visual}</div>
          <div class="card-body">
            <div class="card-id">${escapeHtml(c.id)}</div>
            <input type="text" data-field="name" value="${escapeHtml(c.name)}" placeholder="衣装名" maxlength="80">
            <select data-field="category">${opts}</select>
            <div class="card-actions">
              <button class="btn btn-sm btn-ghost" data-action="upload">画像</button>
              <button class="btn btn-sm btn-danger" data-action="delete">削除</button>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  updateSaveBar();
}

function updateSaveBar(){
  const bar = document.getElementById('save-bar');
  const n = getDirtyCount();
  document.getElementById('dirty-count').textContent = n;
  bar.classList.toggle('visible', n > 0);
}

/* ===========================================================
   編集系
   =========================================================== */
function findCostume(id){ return costumes.find(c => c.id === id); }

function updateField(id, field, value){
  const c = findCostume(id);
  if (!c) return;
  c[field] = value;
  render();
}

function deleteCostume(id){
  const c = findCostume(id);
  if (!c) return;
  if (!confirm(`「${c.name}」を削除しますか？\n（保存ボタンを押すまで元に戻せます）`)) return;
  costumes = costumes.filter(x => x.id !== id);
  render();
}

function discardChanges(){
  if (!confirm('未保存の変更をすべて破棄しますか？')) return;
  costumes = deepClone(originalCostumes);
  document.getElementById('save-msg').textContent = '';
  render();
}

/* ===========================================================
   画像アップロード（Cloudinary Unsigned）
   =========================================================== */
function ensureCloudinaryWidget(targetId){
  if (CLOUDINARY_CLOUD_NAME === 'YOUR_CLOUD_NAME'){
    showToast('Cloudinary 設定が未完了です（admin/costumes.html を編集）', 'error');
    return null;
  }
  if (typeof cloudinary === 'undefined'){
    showToast('Cloudinary ライブラリの読み込みに失敗しました', 'error');
    return null;
  }
  return cloudinary.createUploadWidget({
    cloudName: CLOUDINARY_CLOUD_NAME,
    uploadPreset: CLOUDINARY_UPLOAD_PRESET,
    folder: 'miyo/costumes',
    sources: ['local', 'camera', 'url'],
    multiple: false,
    maxFileSize: 10_000_000,
    cropping: false,
    showAdvancedOptions: false,
    showPoweredBy: false,
    language: 'ja'
  }, (error, result) => {
    if (error){
      console.error(error);
      showToast('アップロードに失敗しました', 'error');
      return;
    }
    if (result && result.event === 'success' && result.info && result.info.secure_url){
      const baseUrl = result.info.secure_url;
      const optimized = /\/upload\/(f_auto|q_auto|w_)/.test(baseUrl)
        ? baseUrl
        : baseUrl.replace('/upload/', '/upload/f_auto,q_auto,w_800/');
      const c = findCostume(targetId);
      if (c){
        c.image = optimized;
        render();
        showToast('画像をアップロードしました');
      }
    }
  });
}
function uploadImage(id){
  const widget = ensureCloudinaryWidget(id);
  if (widget) widget.open();
}

/* ===========================================================
   新規追加
   =========================================================== */
function openAddModal(){
  document.getElementById('new-name').value = '';
  document.getElementById('new-category').value = activeCategory === 'all' ? 'kimono' : activeCategory;
  document.getElementById('add-modal').classList.add('open');
  setTimeout(() => document.getElementById('new-name').focus(), 50);
}
function closeAddModal(){
  document.getElementById('add-modal').classList.remove('open');
}
function confirmAdd(){
  const name = document.getElementById('new-name').value.trim();
  const category = document.getElementById('new-category').value;
  if (!name){ alert('衣装名を入力してください'); return; }
  if (!VALID_CATEGORIES.includes(category)){ alert('カテゴリが不正です'); return; }
  costumes.push({ id: makeId(category), name, category, image: '' });
  closeAddModal();
  render();
  showToast(`「${name}」を追加しました（保存ボタンで反映）`);
}

/* ===========================================================
   保存
   =========================================================== */
async function saveAll(){
  const btn = document.getElementById('save-btn');
  const msg = document.getElementById('save-msg');
  btn.disabled = true;
  btn.textContent = '保存中...';
  msg.classList.remove('error');
  msg.textContent = '';

  try {
    const res = await fetch('/api/costumes', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password, costumes })
    });
    if (res.status === 401){
      msg.classList.add('error');
      msg.textContent = 'パスワードエラー';
      showToast('パスワードが違います。再ログインしてください', 'error');
      setTimeout(logout, 1500);
      return;
    }
    if (!res.ok){
      const body = await res.json().catch(() => ({}));
      throw new Error(body.error || `HTTP ${res.status}`);
    }
    const data = await res.json();
    if (Array.isArray(data.costumes)){
      costumes = deepClone(data.costumes);
      originalCostumes = deepClone(data.costumes);
    } else {
      originalCostumes = deepClone(costumes);
    }
    render();
    showToast('保存しました ✓');
  } catch (e){
    msg.classList.add('error');
    msg.textContent = '保存失敗';
    showToast('保存に失敗しました: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '変更を保存';
  }
}

/* ===========================================================
   イベント
   =========================================================== */
document.getElementById('login-btn').addEventListener('click', attemptLogin);
document.getElementById('password-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') attemptLogin();
});
document.getElementById('logout-btn').addEventListener('click', logout);

document.getElementById('filter-tabs').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  document.querySelectorAll('#filter-tabs button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeCategory = btn.dataset.cat;
  render();
});
document.getElementById('search-input').addEventListener('input', e => {
  searchKeyword = e.target.value.trim();
  render();
});

document.getElementById('open-add-btn').addEventListener('click', openAddModal);
document.getElementById('empty-add-btn').addEventListener('click', openAddModal);
document.getElementById('add-cancel-btn').addEventListener('click', closeAddModal);
document.getElementById('add-confirm-btn').addEventListener('click', confirmAdd);
document.getElementById('add-modal').addEventListener('click', e => {
  if (e.target.id === 'add-modal') closeAddModal();
});

document.getElementById('save-btn').addEventListener('click', saveAll);
document.getElementById('discard-btn').addEventListener('click', discardChanges);

// グリッド内のボタン／入力をイベント委譲で処理
document.getElementById('grid').addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (!card) return;
  const id = card.dataset.id;
  const action = e.target.closest('[data-action]')?.dataset.action;
  if (action === 'upload') uploadImage(id);
  else if (action === 'delete') deleteCostume(id);
});
document.getElementById('grid').addEventListener('change', e => {
  const card = e.target.closest('.card');
  if (!card) return;
  const id = card.dataset.id;
  const field = e.target.dataset.field;
  if (field) updateField(id, field, e.target.value);
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape'){
    if (document.getElementById('add-modal').classList.contains('open')) closeAddModal();
  }
});

window.addEventListener('beforeunload', e => {
  if (getDirtyCount() > 0){
    e.preventDefault();
    e.returnValue = '';
  }
});

/* ===========================================================
   起動
   =========================================================== */
document.getElementById('password-input').focus();
</script>
